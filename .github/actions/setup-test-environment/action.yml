name: 'Setup Test Environment'
description: 'Common setup steps for integration tests including dependencies, providers, and build'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
  client-version:
    description: 'Client version (latest or published)'
    required: true
  sdk_install_url:
    description: 'URL to install Python SDK from (for testing preview builds). If provided, overrides client-version.'
    required: false
    default: ''
  setup:
    description: 'Setup to configure (ollama, vllm, gpt, etc.)'
    required: false
    default: 'ollama'
  suite:
    description: 'Test suite to use: base, responses, vision, etc.'
    required: false
    default: ''
  inference-mode:
    description: 'Inference mode (record or replay)'
    required: true
  branch:
    description: 'Explicit branch override (used by scheduled CI to pass the matrix branch)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      uses: ./.github/actions/setup-runner
      with:
        python-version: ${{ inputs.python-version }}
        client-version: ${{ inputs.client-version }}
        sdk_install_url: ${{ inputs.sdk_install_url }}
        branch: ${{ inputs.branch }}

    - name: Cache HuggingFace models and datasets
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: hf-cache-${{ runner.os }}-${{ inputs.python-version }}
        restore-keys: |
          hf-cache-${{ runner.os }}-

    - name: Pre-download HuggingFace assets for offline use
      shell: bash
      env:
        HF_HUB_ENABLE_HF_TRANSFER: "1"
      run: |
        # Download the embedding model used by inline::sentence-transformers
        uv run python -c "
        from sentence_transformers import SentenceTransformer
        SentenceTransformer('nomic-ai/nomic-embed-text-v1.5', trust_remote_code=True)
        print('Embedding model cached')
        " 2>/dev/null || echo "Embedding model download failed (may already be cached)"

        # Download the test dataset
        uv run python -c "
        from datasets import load_dataset
        load_dataset('ogx/simpleqa', split='train')
        print('Dataset cached')
        " 2>/dev/null || echo "Dataset download failed (may already be cached)"

    - name: Setup ollama
      if: ${{ startsWith(inputs.setup, 'ollama') && inputs.inference-mode != 'replay' }}
      uses: ./.github/actions/setup-ollama
      with:
        suite: ${{ inputs.suite }}
        setup: ${{ inputs.setup }}

    - name: Setup vllm
      if: ${{ startsWith(inputs.setup, 'vllm') && inputs.inference-mode != 'replay' }}
      uses: ./.github/actions/setup-vllm

    - name: Start Postgres service
      if: ${{ contains(inputs.setup, 'postgres') }}
      shell: bash
      run: |
        sudo docker rm -f postgres-ci || true
        sudo docker run -d --name postgres-ci \
          -e POSTGRES_USER=ogx \
          -e POSTGRES_PASSWORD=ogx \
          -e POSTGRES_DB=ogx \
          -p 5432:5432 \
          postgres:16

        echo "Waiting for Postgres to become ready..."
        for i in {1..30}; do
          if sudo docker exec postgres-ci pg_isready -U ogx -d ogx >/dev/null 2>&1; then
            echo "Postgres is ready"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "Postgres failed to start in time"
            sudo docker logs postgres-ci || true
            exit 1
          fi
          sleep 2
        done

    - name: Verify client installation
      shell: bash
      run: |
        echo "Verifying ogx-client installation:"
        uv pip show ogx-client || echo "ogx-client not found"
        echo ""
        echo "All installed ogx packages:"
        uv pip list | grep ogx || true

    - name: Build OGX
      shell: bash
      run: |
        # Client is already installed by setup-runner (handles both main and release branches)
        echo "Building OGX"

        OGX_DIR=. \
          uv run --no-sync ogx stack list-deps ci-tests | xargs -L1 uv pip install

    - name: Configure git for commits
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

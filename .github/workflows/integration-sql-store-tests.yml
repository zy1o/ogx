name: SqlStore Integration Tests

run-name: Run the integration test suite with SqlStore

on:
  push:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+.x'
    paths:
      - 'src/ogx/providers/utils/sqlstore/**'
      - 'src/ogx/core/storage/kvstore/postgres/**'
      - 'tests/integration/sqlstore/**'
      - 'tests/integration/providers/utils/kvstore/**'
      - 'uv.lock'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/integration-sql-store-tests.yml' # This workflow
  merge_group:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  test-postgres:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ogx
          POSTGRES_PASSWORD: ogx
          POSTGRES_DB: ogx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/setup-runner
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run SqlStore Integration Tests
        env:
          ENABLE_POSTGRES_TESTS: "true"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ogx
          POSTGRES_USER: ogx
          POSTGRES_PASSWORD: ogx
        run: |
          uv run pytest -sv tests/integration/providers/utils/sqlstore/

      - name: Run KVStore Connection Resilience Test
        env:
          ENABLE_POSTGRES_TESTS: "true"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ogx
          POSTGRES_USER: ogx
          POSTGRES_PASSWORD: ogx
        run: |
          uv run pytest -sv tests/integration/providers/utils/kvstore/

      - name: Upload test logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: postgres-test-logs-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.python-version }}
          path: |
            *.log
          retention-days: 1

components:
  schemas:
    Error:
      description: Error response from the API. Roughly follows RFC 7807.
      properties:
        status:
          title: Status
          type: integer
        title:
          title: Title
          type: string
        detail:
          title: Detail
          type: string
        instance:
          anyOf:
          - type: string
          - type: 'null'
          nullable: true
      required:
      - status
      - title
      - detail
      title: Error
      type: object
    ListBatchesResponse:
      properties:
        object:
          type: string
          title: Object
          enum:
          - list
        data:
          items:
            $ref: '#/components/schemas/Batch'
          type: array
          title: Data
          description: List of batch objects
        first_id:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the first batch in the list
        last_id:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the last batch in the list
        has_more:
          type: boolean
          title: Has More
          description: Whether there are more batches available
          default: false
      type: object
      required:
      - data
      title: ListBatchesResponse
      description: Response containing a list of batch objects.
    CreateBatchRequest:
      properties:
        input_file_id:
          type: string
          title: Input File Id
          description: The ID of an uploaded file containing requests for the batch.
        endpoint:
          type: string
          title: Endpoint
          description: The endpoint to be used for all requests in the batch.
        completion_window:
          type: string
          title: Completion Window
          description: The time window within which the batch should be processed.
          enum:
          - 24h
        metadata:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          description: Optional metadata for the batch.
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional idempotency key. When provided, enables idempotent behavior.
      type: object
      required:
      - input_file_id
      - endpoint
      - completion_window
      title: CreateBatchRequest
      description: Request model for creating a batch.
    Batch:
      properties:
        id:
          type: string
          title: Id
        completion_window:
          type: string
          title: Completion Window
        created_at:
          type: integer
          title: Created At
        endpoint:
          type: string
          title: Endpoint
        input_file_id:
          type: string
          title: Input File Id
        object:
          type: string
          title: Object
          enum:
          - batch
        status:
          type: string
          enum:
          - validating
          - failed
          - in_progress
          - finalizing
          - completed
          - expired
          - cancelling
          - cancelled
          title: Status
        cancelled_at:
          anyOf:
          - type: integer
          - type: 'null'
        cancelling_at:
          anyOf:
          - type: integer
          - type: 'null'
        completed_at:
          anyOf:
          - type: integer
          - type: 'null'
        error_file_id:

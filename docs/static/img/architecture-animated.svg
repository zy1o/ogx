<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="'Archivo','Public Sans',-apple-system,BlinkMacSystemFont,sans-serif">
  <style>
    :root {
      --bg: #0e1520;
      --grid-stroke: #fff;
      --grid-opacity: 0.04;
      --col-label: #4b6478;
      --col-divider: #1e2d3d;
      --flow-stroke: #1a5c5e;
      --flow-dot: #2dbdc2;
      --card-bg: #131e2a;
      --card-stroke: #1e3040;
      --item-bg: #182838;
      --item-text: #7fb8c4;
      --server-bg: #0d1a24;
      --server-accent: #0d7377;
      --server-label: #e0f5f5;
      --section-label: #2dbdc2;
      --block-bg: #111f2d;
      --block-stroke: #1a3545;
      --block-title: #5da8b0;
      --block-text: #6b8d96;
      --muted-text: #3d5a6e;
      --tagline: #3d5a6e;
      --shadow-opacity: 0.12;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8f9fa;
        --grid-stroke: #000;
        --grid-opacity: 0.04;
        --col-label: #6b7d8e;
        --col-divider: #d8dee4;
        --flow-stroke: #0d7377;
        --flow-dot: #0d7377;
        --card-bg: #ffffff;
        --card-stroke: #d8dee4;
        --item-bg: #f0f3f5;
        --item-text: #2d4a56;
        --server-bg: #ffffff;
        --server-accent: #0d7377;
        --server-label: #ffffff;
        --section-label: #0b6165;
        --block-bg: #f5f7f8;
        --block-stroke: #d8dee4;
        --block-title: #0b6165;
        --block-text: #4a6570;
        --muted-text: #6b7d8e;
        --tagline: #6b7d8e;
        --shadow-opacity: 0.06;
      }
    }
  </style>
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="var(--shadow-opacity, 0.12)"/></filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="540" rx="8" fill="var(--bg)"/>

  <!-- Subtle grid -->
  <g opacity="var(--grid-opacity)">
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0 L0,0 0,40" fill="none" stroke="var(--grid-stroke)" stroke-width="0.5"/>
    </pattern>
    <rect width="780" height="540" fill="url(#g)"/>
  </g>

  <!-- ========== COLUMN LABELS ========== -->
  <text x="88" y="30" text-anchor="middle" fill="var(--col-label)" font-size="10" font-weight="700" letter-spacing="1.5">YOUR APP</text>
  <text x="340" y="30" text-anchor="middle" fill="var(--col-label)" font-size="10" font-weight="700" letter-spacing="1.5">OGX</text>
  <text x="640" y="30" text-anchor="middle" fill="var(--col-label)" font-size="10" font-weight="700" letter-spacing="1.5">PROVIDERS</text>

  <!-- Column dividers -->
  <line x1="195" y1="20" x2="195" y2="450" stroke="var(--col-divider)" stroke-width="1"/>
  <line x1="490" y1="20" x2="490" y2="450" stroke="var(--col-divider)" stroke-width="1"/>

  <!-- ========== FLOW LINES ========== -->
  <path d="M160,120 L210,120" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M160,195 L210,195" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M160,270 L210,270" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M160,345 L210,345" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M475,100 L505,100" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M475,195 L505,195" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M475,290 L505,290" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M475,380 L505,380" stroke="var(--flow-stroke)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Animated dots -->
  <circle r="3" fill="var(--flow-dot)" opacity="0.8">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M160,120 L210,120"/>
  </circle>
  <circle r="3" fill="var(--flow-dot)" opacity="0.8">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.4s" path="M160,270 L210,270"/>
  </circle>
  <circle r="3" fill="var(--flow-dot)" opacity="0.6">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.2s" path="M475,100 L505,100"/>
  </circle>
  <circle r="3" fill="var(--flow-dot)" opacity="0.6">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.8s" path="M475,290 L505,290"/>
  </circle>

  <!-- ========== YOUR APP (left column) ========== -->
  <g filter="url(#s)">
    <rect x="18" y="55" width="140" height="340" rx="6" fill="var(--card-bg)" stroke="var(--card-stroke)" stroke-width="1"/>

    <g transform="translate(30, 72)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">OpenAI SDK</text>
    </g>
    <g transform="translate(30, 108)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">Anthropic SDK</text>
    </g>
    <g transform="translate(30, 144)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">Google GenAI SDK</text>
    </g>
    <g transform="translate(30, 180)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">Python / Node.js</text>
    </g>
    <g transform="translate(30, 180)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">Go / Rust</text>
    </g>
    <g transform="translate(30, 216)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">curl / HTTP</text>
    </g>
    <g transform="translate(30, 252)">
      <rect width="116" height="28" rx="4" fill="var(--item-bg)"/>
      <text x="10" y="18" fill="var(--item-text)" font-size="10" font-weight="500">Any framework</text>
    </g>

    <text x="88" y="310" text-anchor="middle" fill="var(--muted-text)" font-size="8" font-weight="600" letter-spacing="0.5">Standard HTTP</text>
    <text x="88" y="322" text-anchor="middle" fill="var(--muted-text)" font-size="8" font-weight="600" letter-spacing="0.5">OpenAI-compatible</text>
    <path d="M88,335 L88,370 L95,363 M88,370 L81,363" stroke="var(--muted-text)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="88" y="385" text-anchor="middle" fill="var(--muted-text)" font-size="7.5">Language agnostic</text>
  </g>

  <!-- ========== OGX SERVER (center column) ========== -->
  <g filter="url(#s)">
    <rect x="210" y="55" width="265" height="445" rx="6" fill="var(--server-bg)" stroke="var(--server-accent)" stroke-width="1.5"/>

    <rect x="210" y="55" width="265" height="30" rx="6" fill="var(--server-accent)"/>
    <rect x="210" y="79" width="265" height="6" fill="var(--server-accent)"/>
    <text x="342" y="75" text-anchor="middle" fill="var(--server-label)" font-size="11" font-weight="700" letter-spacing="1">OGX SERVER</text>

    <text x="228" y="108" fill="var(--section-label)" font-size="9" font-weight="700" letter-spacing="0.5">ENDPOINTS</text>

    <!-- OpenAI block -->
    <g transform="translate(222, 115)">
      <rect width="243" height="68" rx="4" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="18" fill="var(--block-title)" font-size="8.5" font-weight="600">OpenAI API</text>
      <line x1="10" y1="24" x2="233" y2="24" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="38" fill="var(--block-text)" font-size="7.5">chat/completions  responses  embeddings</text>
      <text x="10" y="50" fill="var(--block-text)" font-size="7.5">vector_stores  files  batches  models</text>
      <text x="10" y="62" fill="var(--block-text)" font-size="7.5">conversations</text>
    </g>

    <!-- Anthropic block -->
    <g transform="translate(222, 190)">
      <rect width="243" height="38" rx="4" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="16" fill="var(--block-title)" font-size="8.5" font-weight="600">Anthropic API</text>
      <line x1="10" y1="22" x2="233" y2="22" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="33" fill="var(--block-text)" font-size="7.5">messages</text>
    </g>

    <!-- Google API block -->
    <g transform="translate(222, 235)">
      <rect width="243" height="38" rx="4" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="16" fill="var(--block-title)" font-size="8.5" font-weight="600">Google API</text>
      <line x1="10" y1="22" x2="233" y2="22" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="33" fill="var(--block-text)" font-size="7.5">interactions</text>
    </g>

    <!-- Native APIs block -->
    <g transform="translate(222, 280)">
      <rect width="243" height="38" rx="4" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="16" fill="var(--block-title)" font-size="8.5" font-weight="600">Native APIs</text>
      <line x1="10" y1="22" x2="233" y2="22" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="33" fill="var(--block-text)" font-size="7.5">connectors  tools  file-processors</text>
    </g>

    <!-- Orchestration -->
    <text x="228" y="341" fill="var(--section-label)" font-size="9" font-weight="700" letter-spacing="0.5">ORCHESTRATION</text>
    <g transform="translate(222, 348)">
      <rect width="243" height="38" rx="4" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="16" fill="var(--block-title)" font-size="8.5" font-weight="600">Responses Engine</text>
      <line x1="10" y1="22" x2="233" y2="22" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="10" y="33" fill="var(--block-text)" font-size="7.5">tool calling  MCP  multi-turn  streaming</text>
    </g>

    <!-- Middleware -->
    <text x="228" y="410" fill="var(--section-label)" font-size="9" font-weight="700" letter-spacing="0.5">MIDDLEWARE</text>
    <g transform="translate(222, 418)">
      <rect width="55" height="20" rx="3" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="27" y="14" text-anchor="middle" fill="var(--block-title)" font-size="7.5">Auth</text>
    </g>
    <g transform="translate(282, 418)">
      <rect width="65" height="20" rx="3" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="32" y="14" text-anchor="middle" fill="var(--block-title)" font-size="7.5">Telemetry</text>
    </g>
    <g transform="translate(352, 418)">
      <rect width="55" height="20" rx="3" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="27" y="14" text-anchor="middle" fill="var(--block-title)" font-size="7.5">Metrics</text>
    </g>
    <g transform="translate(412, 418)">
      <rect width="55" height="20" rx="3" fill="var(--block-bg)" stroke="var(--block-stroke)" stroke-width="0.5"/>
      <text x="27" y="14" text-anchor="middle" fill="var(--block-title)" font-size="7.5">Storage</text>
    </g>

    <text x="342" y="475" text-anchor="middle" fill="var(--muted-text)" font-size="8" font-weight="600" letter-spacing="0.5">Pluggable provider routing</text>
    <text x="342" y="487" text-anchor="middle" fill="var(--muted-text)" font-size="8" font-weight="600" letter-spacing="0.5">One config, swap backends</text>
  </g>

  <!-- ========== PROVIDERS (right column) ========== -->
  <g filter="url(#s)">
    <rect x="505" y="55" width="258" height="445" rx="6" fill="var(--card-bg)" stroke="var(--card-stroke)" stroke-width="1"/>

    <!-- Inference -->
    <text x="520" y="80" fill="var(--section-label)" font-size="9" font-weight="700" letter-spacing="0.5">INFERENCE (23)</text>
    <g transform="translate(517, 88)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Ollama</text>
    </g>
    <g transform="translate(635, 88)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">vLLM</text>
    </g>
    <g transform="translate(517, 114)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">AWS Bedrock</text>
    </g>
    <g transform="translate(635, 114)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Azure OpenAI</text>
    </g>
    <g transform="translate(517, 140)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">OpenAI</text>
    </g>
    <g transform="translate(635, 140)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Anthropic</text>
    </g>

    <line x1="517" y1="172" x2="747" y2="172" stroke="var(--col-divider)" stroke-width="0.5"/>

    <!-- Vector Stores -->
    <text x="520" y="190" fill="var(--section-label)" font-size="9" font-weight="700" letter-spacing="0.5">VECTOR STORES (15)</text>
    <g transform="translate(517, 198)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">PGVector</text>
    </g>
    <g transform="translate(635, 198)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Qdrant</text>
    </g>
    <g transform="translate(517, 224)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">ChromaDB</text>
    </g>
    <g transform="translate(635, 224)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Milvus</text>
    </g>

    <line x1="517" y1="256" x2="747" y2="256" stroke="var(--col-divider)" stroke-width="0.5"/>

    <!-- Tools & Files -->
    <text x="520" y="274" fill="var(--section-label)" font-size="9" font-weight="700" letter-spacing="0.5">TOOLS &amp; FILES</text>
    <g transform="translate(517, 282)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">MCP Servers</text>
    </g>
    <g transform="translate(635, 282)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Web Search</text>
    </g>
    <g transform="translate(517, 308)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">Local FS / S3</text>
    </g>
    <g transform="translate(635, 308)">
      <rect width="112" height="22" rx="3" fill="var(--item-bg)"/>
      <text x="8" y="15" fill="var(--item-text)" font-size="8.5">PDF / Docling</text>
    </g>
  </g>

  <!-- ========== TAGLINE ========== -->
  <text x="390" y="528" text-anchor="middle" fill="var(--tagline)" font-size="10" font-weight="600" letter-spacing="2">
    OPEN SOURCE  ·  OPENAI · ANTHROPIC · GOOGLE COMPATIBLE  ·  YOUR INFRASTRUCTURE
  </text>
</svg>

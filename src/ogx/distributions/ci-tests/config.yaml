version: 2
distro_name: ci-tests
apis:
- batches
- file_processors
- files
- inference
- interactions
- messages
- responses
- safety
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: ${env.CEREBRAS_API_KEY:+cerebras}
    provider_type: remote::cerebras
    config:
      base_url: https://api.cerebras.ai/v1
      api_key: ${env.CEREBRAS_API_KEY:=}
  - provider_id: ${env.OLLAMA_URL:+ollama}
    provider_type: remote::ollama
    config:
      base_url: ${env.OLLAMA_URL:=http://localhost:11434/v1}
  - provider_id: ${env.VLLM_URL:+vllm}
    provider_type: remote::vllm
    config:
      base_url: ${env.VLLM_URL:=}
      max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
      api_token: ${env.VLLM_API_TOKEN:=fake}
      network:
        tls:
          verify: ${env.VLLM_TLS_VERIFY:=true}
  - provider_id: fireworks
    provider_type: remote::fireworks
    config:
      base_url: https://api.fireworks.ai/inference/v1
      api_key: ${env.FIREWORKS_API_KEY:=}
  - provider_id: together
    provider_type: remote::together
    config:
      base_url: https://api.together.xyz/v1
      api_key: ${env.TOGETHER_API_KEY:=}
  - provider_id: bedrock
    provider_type: remote::bedrock
    config:
      api_key: ${env.AWS_BEARER_TOKEN_BEDROCK:=}
      region_name: ${env.AWS_DEFAULT_REGION:=us-east-2}
      aws_role_arn: ${env.AWS_ROLE_ARN:=}
      aws_web_identity_token_file: ${env.AWS_WEB_IDENTITY_TOKEN_FILE:=}
  - provider_id: ${env.NVIDIA_API_KEY:+nvidia}
    provider_type: remote::nvidia
    config:
      base_url: ${env.NVIDIA_BASE_URL:=https://integrate.api.nvidia.com/v1}
      api_key: ${env.NVIDIA_API_KEY:=}
  - provider_id: openai
    provider_type: remote::openai
    config:
      api_key: ${env.OPENAI_API_KEY:=}
      base_url: ${env.OPENAI_BASE_URL:=https://api.openai.com/v1}
  - provider_id: anthropic
    provider_type: remote::anthropic
    config:
      api_key: ${env.ANTHROPIC_API_KEY:=}
  - provider_id: gemini
    provider_type: remote::gemini
    config:
      api_key: ${env.GEMINI_API_KEY:=}
      access_token: ${env.GEMINI_ACCESS_TOKEN:=}
      project: ${env.GEMINI_AI_PROJECT:=}
  - provider_id: ${env.VERTEX_AI_PROJECT:+vertexai}
    provider_type: remote::vertexai
    config:
      project: ${env.VERTEX_AI_PROJECT:=}
      location: ${env.VERTEX_AI_LOCATION:=global}
  - provider_id: groq
    provider_type: remote::groq
    config:
      base_url: https://api.groq.com/openai/v1
      api_key: ${env.GROQ_API_KEY:=}
  - provider_id: sambanova
    provider_type: remote::sambanova
    config:
      base_url: https://api.sambanova.ai/v1
      api_key: ${env.SAMBANOVA_API_KEY:=}
  - provider_id: ${env.AZURE_API_KEY:+azure}
    provider_type: remote::azure
    config:
      api_key: ${env.AZURE_API_KEY:=}
      base_url: ${env.AZURE_API_BASE:=}
      api_version: ${env.AZURE_API_VERSION:=}
      api_type: ${env.AZURE_API_TYPE:=}
  - provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
    config:
      trust_remote_code: true
  - provider_id: transformers
    provider_type: inline::transformers
  - provider_id: ${env.WATSONX_API_KEY:+watsonx}
    provider_type: remote::watsonx
    config:
      base_url: ${env.WATSONX_BASE_URL:=https://us-south.ml.cloud.ibm.com}
      api_key: ${env.WATSONX_API_KEY:=}
      project_id: ${env.WATSONX_PROJECT_ID:=}
  vector_io:
  - provider_id: faiss
    provider_type: inline::faiss
    config:
      persistence:
        namespace: vector_io::faiss
        backend: kv_default
  - provider_id: sqlite-vec
    provider_type: inline::sqlite-vec
    config:
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/ci-tests}/sqlite_vec.db
      persistence:
        namespace: vector_io::sqlite_vec
        backend: kv_default
  - provider_id: ${env.MILVUS_URL:+milvus}
    provider_type: inline::milvus
    config:
      db_path: ${env.MILVUS_DB_PATH:=~/.ogx/distributions/ci-tests}/milvus.db
      persistence:
        namespace: vector_io::milvus
        backend: kv_default
  - provider_id: ${env.CHROMADB_URL:+chromadb}
    provider_type: remote::chromadb
    config:
      url: ${env.CHROMADB_URL:=}
      persistence:
        namespace: vector_io::chroma_remote
        backend: kv_default
  - provider_id: ${env.PGVECTOR_DB:+pgvector}
    provider_type: remote::pgvector
    config:
      host: ${env.PGVECTOR_HOST:=localhost}
      port: ${env.PGVECTOR_PORT:=5432}
      db: ${env.PGVECTOR_DB:=}
      user: ${env.PGVECTOR_USER:=}
      password: ${env.PGVECTOR_PASSWORD:=}
      distance_metric: COSINE
      vector_index:
        type: HNSW
        m: 16
        ef_construction: 64
        ef_search: 40
      persistence:
        namespace: vector_io::pgvector
        backend: kv_default
  - provider_id: ${env.QDRANT_URL:+qdrant}
    provider_type: remote::qdrant
    config:
      api_key: ${env.QDRANT_API_KEY:=}
      persistence:
        namespace: vector_io::qdrant_remote
        backend: kv_default
  - provider_id: ${env.WEAVIATE_CLUSTER_URL:+weaviate}
    provider_type: remote::weaviate
    config:
      weaviate_api_key: null
      weaviate_cluster_url: ${env.WEAVIATE_CLUSTER_URL:=localhost:8080}
      persistence:
        namespace: vector_io::weaviate
        backend: kv_default
  - provider_id: ${env.ELASTICSEARCH_URL:+elasticsearch}
    provider_type: remote::elasticsearch
    config:
      elasticsearch_url: ${env.ELASTICSEARCH_URL:=localhost:9200}
      elasticsearch_api_key: ${env.ELASTICSEARCH_API_KEY:=}
      persistence:
        namespace: vector_io::elasticsearch
        backend: kv_default
  - provider_id: ${env.INFINISPAN_URL:+infinispan}
    provider_type: remote::infinispan
    config:
      url: ${env.INFINISPAN_URL:=http://localhost:11222}
      username: ${env.INFINISPAN_USERNAME:=admin}
      password: ${env.INFINISPAN_PASSWORD:=}
      use_https: false
      auth_mechanism: digest
      verify_tls: true
      persistence:
        namespace: vector_io::infinispan
        backend: kv_default
  files:
  - provider_id: builtin-files
    provider_type: inline::localfs
    config:
      storage_dir: ${env.FILES_STORAGE_DIR:=~/.ogx/distributions/ci-tests/files}
      metadata_store:
        table_name: files_metadata
        backend: sql_default
  file_processors:
  - provider_id: auto
    provider_type: inline::auto
  safety:
  - provider_id: llama-guard
    provider_type: inline::llama-guard
    config:
      excluded_categories: []
  - provider_id: code-scanner
    provider_type: inline::code-scanner
  interactions:
  - provider_id: builtin
    provider_type: inline::builtin
  messages:
  - provider_id: builtin
    provider_type: inline::builtin
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          namespace: agents
          backend: kv_default
        responses:
          table_name: responses
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
  tool_runtime:
  - provider_id: brave-search
    provider_type: remote::brave-search
    config:
      api_key: ${env.BRAVE_SEARCH_API_KEY:=}
      max_results: 3
  - provider_id: tavily-search
    provider_type: remote::tavily-search
    config:
      api_key: ${env.TAVILY_SEARCH_API_KEY:=}
      max_results: 3
  - provider_id: file-search
    provider_type: inline::file-search
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
  batches:
  - provider_id: reference
    provider_type: inline::reference
    config:
      sqlstore:
        table_name: batches
        backend: sql_default
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/ci-tests}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/ci-tests}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      table_name: prompts
      backend: sql_default
    connectors:
      table_name: connectors
      backend: sql_default
registered_resources:
  models:
  - metadata: {}
    model_id: claude-haiku-4-5-20251001
    provider_id: all
    provider_model_id: auto
    model_type: llm
  - metadata: {}
    model_id: claude-sonnet-4-5-20250514
    provider_id: all
    provider_model_id: auto
    model_type: llm
  - metadata: {}
    model_id: claude-opus-4-6-20260314
    provider_id: all
    provider_model_id: auto
    model_type: llm
  - metadata: {}
    model_id: azure/gpt-4o
    provider_id: ${env.AZURE_API_KEY:+azure}
    provider_model_id: gpt-4o
    model_type: llm
  - metadata: {}
    model_id: watsonx/meta-llama/llama-3-3-70b-instruct
    provider_id: ${env.WATSONX_API_KEY:+watsonx}
    provider_model_id: meta-llama/llama-3-3-70b-instruct
    model_type: llm
  - metadata: {}
    model_id: vertexai/publishers/google/models/gemini-2.0-flash
    provider_id: ${env.VERTEX_AI_PROJECT:+vertexai}
    provider_model_id: publishers/google/models/gemini-2.0-flash
    model_type: llm
  - metadata: {}
    model_id: bedrock/openai.gpt-oss-20b-1:0
    provider_id: ${env.AWS_DEFAULT_REGION:+bedrock}
    provider_model_id: openai.gpt-oss-20b-1:0
    model_type: llm
  shields:
  - shield_id: llama-guard
    provider_id: ${env.SAFETY_MODEL:+llama-guard}
    provider_shield_id: ${env.SAFETY_MODEL:=}
  - shield_id: code-scanner
    provider_id: ${env.CODE_SCANNER_MODEL:+code-scanner}
    provider_shield_id: ${env.CODE_SCANNER_MODEL:=}
  vector_dbs: []
server:
  port: 8321
  auth:
    provider_config:
      type: ${env.AUTH_PROVIDER:+oauth2_token}
      audience: ${env.AUTH_AUDIENCE:=ogx}
      issuer: ${env.AUTH_ISSUER:=}
      jwks:
        uri: ${env.AUTH_JWKS_URI:=}
        key_recheck_period: ${env.AUTH_JWKS_RECHECK_PERIOD:=3600}
      verify_tls: ${env.AUTH_VERIFY_TLS:=true}
vector_stores:
  default_provider_id: faiss
  default_embedding_model:
    provider_id: sentence-transformers
    model_id: nomic-ai/nomic-embed-text-v1.5
  default_reranker_model:
    provider_id: transformers
    model_id: Qwen/Qwen3-Reranker-0.6B
  file_search_params:
    header_template: 'file_search tool found {num_chunks} chunks:

      BEGIN of file_search tool results.

      '
    footer_template: 'END of file_search tool results.

      '
  context_prompt_params:
    chunk_annotation_template: 'Result {index}

      Content: {chunk.content}

      Metadata: {metadata}

      '
    context_template: 'The above results were retrieved to help answer the user''s
      query: "{query}". Use them as supporting information only in answering this
      query. {annotation_instruction}

      '
  annotation_prompt_params:
    enable_annotations: true
    annotation_instruction_template: Cite sources immediately at the end of sentences
      before punctuation, using `<|file-id|>` format like 'This is a fact <|file-Cn3MSNn72ENTiiq11Qda4A|>.'.
      Do not add extra punctuation. Use only the file IDs provided, do not invent
      new ones.
    chunk_annotation_template: '[{index}] {metadata_text} cite as <|{file_id}|>

      {chunk_text}

      '
  file_ingestion_params:
    default_chunk_size_tokens: 512
    default_chunk_overlap_tokens: 128
  chunk_retrieval_params:
    chunk_multiplier: 5
    max_tokens_in_context: 4000
    default_reranker_strategy: rrf
    rrf_impact_factor: 60.0
    weighted_search_alpha: 0.5
    default_search_mode: vector
  file_batch_params:
    max_concurrent_files_per_batch: 3
    file_batch_chunk_size: 10
    cleanup_interval_seconds: 86400
  contextual_retrieval_params:
    default_timeout_seconds: 120
    default_max_concurrency: 3
    max_document_tokens: 100000
safety:
  default_shield_id: llama-guard
connectors:
- connector_type: mcp
  connector_id: test-mcp-connector
  url: http://localhost:5199/sse
